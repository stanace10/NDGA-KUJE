name: ndga

x-app-env: &app-env
  env_file:
    - ./.env.lan
  environment: &app-environment
    EXAM_SAFE_MODE: "1"
    DB_HOST: pgbouncer
    DB_PORT: "6432"
    DATABASE_CONN_MAX_AGE: "0"
    CONN_MAX_AGE: "0"
    REDIS_STATE_URL: redis://redis_state:6379/0
    REDIS_CACHE_URL: redis://redis_broker:6379/1
    CHANNEL_REDIS_URL: redis://redis_broker:6379/2
    CELERY_BROKER_URL: redis://redis_broker:6379/0
    CELERY_RESULT_BACKEND: redis://redis_broker:6379/3
    MONITOR_CELERY_QUEUE_NAMES: critical
    RATE_LIMIT_LOGIN_LIMIT: "500"
    LOCKDOWN_HEARTBEAT_INTERVAL_SECONDS: "15"
    LOCKDOWN_INACTIVITY_TIMEOUT_SECONDS: "300"
    CBT_BROWSER_BREACH_DETECTION_ENABLED: "0"
    CBT_MICROPHONE_REQUIRED: "0"
    GUNICORN_WORKER_CLASS: gthread
    GUNICORN_WORKERS: "4"
    GUNICORN_THREADS: "8"
    GUNICORN_BACKLOG: "4096"
    GUNICORN_KEEPALIVE: "5"
    GUNICORN_TIMEOUT: "60"
    GUNICORN_GRACEFUL_TIMEOUT: "30"
    GUNICORN_MAX_REQUESTS: "5000"
    GUNICORN_MAX_REQUESTS_JITTER: "500"

x-app-volumes: &app-volumes
  - ./.env.cloud:/app/.env.cloud:ro
  - ndga_lan_static_data:/app/staticfiles
  - ndga_lan_media_data:/app/media
  - ndga_lan_backup_data:/app/backups/postgres

services:
  db:
    image: postgres:16
    restart: unless-stopped
    shm_size: 4gb
    command:
      - postgres
      - -c
      - max_connections=80
      - -c
      - shared_buffers=3GB
      - -c
      - effective_cache_size=8GB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=512MB
      - -c
      - checkpoint_timeout=15min
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - max_wal_size=4GB
      - -c
      - min_wal_size=1GB
      - -c
      - idle_in_transaction_session_timeout=30s
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
    environment:
      POSTGRES_DB: ${DB_NAME:-ndga}
      POSTGRES_USER: ${DB_USER:-ndga}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - ndga_lan_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  pgbouncer:
    image: ndga-pgbouncer:prod
    build: ./ops/pgbouncer
    restart: unless-stopped
    environment:
      DB_NAME: ${DB_NAME:-ndga}
      DB_USER: ${DB_USER:-ndga}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: "1000"
      PGBOUNCER_DEFAULT_POOL_SIZE: "40"
      PGBOUNCER_MIN_POOL_SIZE: "10"
      PGBOUNCER_RESERVE_POOL_SIZE: "15"
      PGBOUNCER_RESERVE_POOL_TIMEOUT: "5"
      PGBOUNCER_MAX_DB_CONNECTIONS: "60"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=$$DB_PASSWORD pg_isready -h 127.0.0.1 -p 6432 -U $$DB_USER -d $$DB_NAME"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis_state:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./ops/redis/redis-state.conf:/usr/local/etc/redis/redis.conf:ro
      - ndga_state_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis_broker:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./ops/redis/redis-broker.conf:/usr/local/etc/redis/redis.conf:ro
      - ndga_broker_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    image: ndga-web:prod
    build:
      context: .
      dockerfile: Dockerfile
    <<: *app-env
    command: >-
      sh -c "python manage.py migrate --noinput &&
      python manage.py ensure_default_portal_accounts &&
      python manage.py collectstatic --noinput"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis_state:
        condition: service_healthy
      redis_broker:
        condition: service_healthy
    volumes: *app-volumes
    restart: "no"

  web:
    image: ndga-web:prod
    build:
      context: .
      dockerfile: Dockerfile
    <<: *app-env
    command: ["gunicorn", "core.wsgi:application", "-c", "/app/gunicorn.conf.py"]
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_healthy
      redis_state:
        condition: service_healthy
      redis_broker:
        condition: service_healthy
    volumes: *app-volumes
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz/ready"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  celery_critical:
    image: ndga-web:prod
    build:
      context: .
      dockerfile: Dockerfile
    <<: *app-env
    command:
      - celery
      - -A
      - core
      - worker
      - --loglevel=WARNING
      - --queues=critical
      - --concurrency=4
      - --prefetch-multiplier=1
      - --max-tasks-per-child=1000
      - --without-gossip
      - --without-mingle
      - --without-heartbeat
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    volumes: *app-volumes

  celery_beat:
    image: ndga-web:prod
    profiles: ["non-exam"]
    build:
      context: .
      dockerfile: Dockerfile
    env_file: ["./.env.lan"]
    environment:
      <<: *app-environment
      EXAM_SAFE_MODE: "0"
    command: ["celery", "-A", "core", "beat", "--loglevel=INFO"]
    depends_on:
      web:
        condition: service_healthy
    volumes: *app-volumes
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./ops/nginx/ndga.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs/lan:/etc/nginx/certs:ro
      - ndga_lan_static_data:/app/staticfiles:ro
      - ndga_lan_media_data:/app/media:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/healthz/live"]
      interval: 10s
      timeout: 5s
      retries: 15

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v3.5.0
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.path=/prometheus"]
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ndga_lan_prometheus_data:/prometheus
    ports: ["9090:9090"]
    restart: unless-stopped

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:12.2.0
    depends_on: [prometheus]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ndga_lan_grafana_data:/var/lib/grafana
    ports: ["3000:3000"]
    restart: unless-stopped

volumes:
  ndga_lan_postgres_data:
  ndga_lan_static_data:
  ndga_lan_media_data:
  ndga_lan_backup_data:
  ndga_lan_prometheus_data:
  ndga_lan_grafana_data:
  ndga_state_redis_data:
  ndga_broker_redis_data:
