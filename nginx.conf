map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

map $http_x_forwarded_proto $ndga_forwarded_proto_header {
    default $http_x_forwarded_proto;
    '' $scheme;
}

map $host $ndga_forwarded_proto {
    default $ndga_forwarded_proto_header;
    192.168.10.10 https;
    localhost https;
    127.0.0.1 https;
    ndgak.local https;
}

upstream ndga_asgi {
    server web:8000;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size 25m;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 30d;
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    location / {
        proxy_pass http://ndga_asgi;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $ndga_forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
