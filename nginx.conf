map $http_upgrade $connection_upgrade {
    default upgrade;
    '' '';
}

upstream ndga_web {
    server web:8000;
    keepalive 128;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;
    access_log off;
    client_max_body_size 25m;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Browser microphone APIs only work in a secure context. Keep the wider LAN
    # portal available on HTTP, but always move live attempt runners to HTTPS.
    location ~ ^/cbt/attempts/[0-9]+/run/?$ {
        return 302 https://$host$request_uri;
    }

    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
    }

    location / {
        proxy_pass http://ndga_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;
    access_log off;
    resolver 127.0.0.11 valid=10s ipv6=off;

    ssl_certificate /etc/nginx/certs/ndga-lan.crt;
    ssl_certificate_key /etc/nginx/certs/ndga-lan.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:NDGA_SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    client_max_body_size 25m;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
    }

    location / {
        proxy_pass http://ndga_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
