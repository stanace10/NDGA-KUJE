services:
  db:
    image: postgres:16
    restart: always
    shm_size: 1gb
    command:
      - postgres
      - -c
      - max_connections=80
      - -c
      - shared_buffers=1GB
      - -c
      - effective_cache_size=4GB
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=256MB
      - -c
      - checkpoint_timeout=15min
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - max_wal_size=2GB
      - -c
      - min_wal_size=512MB
      - -c
      - idle_in_transaction_session_timeout=30s
    environment:
      POSTGRES_DB: ${DB_NAME:-ndga}
      POSTGRES_USER: ${DB_USER:-ndga}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ndga}
    volumes:
      - ndga_postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ndga} -d ${DB_NAME:-ndga}"]
      interval: 10s
      timeout: 5s
      retries: 10

  pgbouncer:
    build:
      context: ./ops/pgbouncer
      dockerfile: Dockerfile
    image: ndga-pgbouncer:cloud
    restart: always
    environment:
      DB_NAME: ${DB_NAME:-ndga}
      DB_USER: ${DB_USER:-ndga}
      DB_PASSWORD: ${DB_PASSWORD:-ndga}
      DB_HOST: db
      DB_PORT: "5432"
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: "600"
      PGBOUNCER_DEFAULT_POOL_SIZE: "35"
      PGBOUNCER_MIN_POOL_SIZE: "8"
      PGBOUNCER_RESERVE_POOL_SIZE: "10"
      PGBOUNCER_RESERVE_POOL_TIMEOUT: "5"
      PGBOUNCER_MAX_DB_CONNECTIONS: "55"
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "6432"
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=$$DB_PASSWORD pg_isready -h 127.0.0.1 -p 6432 -U $$DB_USER -d $$DB_NAME"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--appendfsync",
        "everysec",
        "--maxmemory",
        "${REDIS_MAXMEMORY:-512mb}",
        "--maxmemory-policy",
        "${REDIS_MAXMEMORY_POLICY:-allkeys-lru}",
        "--tcp-keepalive",
        "60",
        "--timeout",
        "0"
      ]
    volumes:
      - ndga_redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./.env.cloud
    environment:
      DB_HOST: pgbouncer
      DB_PORT: "6432"
      DATABASE_CONN_MAX_AGE: "0"
      CONN_MAX_AGE: "0"
    command: ["/app/entrypoint.sh"]
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ndga_static_data:/app/staticfiles
      - ndga_media_data:/app/media
      - ndga_backup_data:/app/backups/postgres
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -H 'X-Forwarded-Proto: https' -H 'Host: ndgakuje.org' http://127.0.0.1:8000/ops/healthz/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./.env.cloud
    environment:
      DB_HOST: pgbouncer
      DB_PORT: "6432"
      DATABASE_CONN_MAX_AGE: "0"
      CONN_MAX_AGE: "0"
    command:
      [
        "celery",
        "-A",
        "core",
        "worker",
        "--loglevel=INFO",
        "--concurrency=${CELERY_WORKER_CONCURRENCY:-4}",
        "--prefetch-multiplier=${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}",
        "--max-tasks-per-child=${CELERY_WORKER_MAX_TASKS_PER_CHILD:-500}"
      ]
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    volumes:
      - ndga_media_data:/app/media
      - ndga_backup_data:/app/backups/postgres

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./.env.cloud
    environment:
      DB_HOST: pgbouncer
      DB_PORT: "6432"
      DATABASE_CONN_MAX_AGE: "0"
      CONN_MAX_AGE: "0"
    command: ["celery", "-A", "core", "beat", "--loglevel=INFO"]
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    volumes:
      - ndga_media_data:/app/media
      - ndga_backup_data:/app/backups/postgres

  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./nginx.cloud.conf:/etc/nginx/conf.d/default.conf:ro
      - ndga_static_data:/app/staticfiles:ro
      - ndga_media_data:/app/media:ro
    healthcheck:
      test: ["CMD-SHELL", "nginx -t || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    restart: always
    depends_on:
      nginx:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ndga_caddy_data:/data
      - ndga_caddy_config:/config
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/healthz/live || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  ndga_postgres_data:
  ndga_redis_data:
  ndga_static_data:
  ndga_media_data:
  ndga_backup_data:
  ndga_caddy_data:
  ndga_caddy_config:

