services:
  db:
    image: postgres:16
    restart: always
    command:
      [
        "postgres",
        "-c",
        "max_connections=${POSTGRES_MAX_CONNECTIONS:-300}"
      ]
    environment:
      POSTGRES_DB: ${DB_NAME:-ndga}
      POSTGRES_USER: ${DB_USER:-ndga}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ndga}
    volumes:
      - ndga_lan_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ndga} -d ${DB_NAME:-ndga}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--appendfsync",
        "everysec",
        "--maxmemory",
        "${REDIS_MAXMEMORY:-512mb}",
        "--maxmemory-policy",
        "${REDIS_MAXMEMORY_POLICY:-allkeys-lru}",
        "--tcp-keepalive",
        "60",
        "--timeout",
        "0"
      ]
    volumes:
      - ndga_lan_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./.env.lan
    command: ["/app/entrypoint.sh"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./.env.cloud:/app/.env.cloud:ro
      - ndga_lan_static_data:/app/staticfiles
      - ndga_lan_media_data:/app/media
      - ndga_lan_backup_data:/app/backups/postgres
    expose:
      - "8000"

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./.env.lan
    command:
      [
        "celery",
        "-A",
        "core",
        "worker",
        "--loglevel=INFO",
        "--concurrency=${CELERY_WORKER_CONCURRENCY:-4}",
        "--prefetch-multiplier=${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}",
        "--max-tasks-per-child=${CELERY_WORKER_MAX_TASKS_PER_CHILD:-500}"
      ]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started
    volumes:
      - ./.env.cloud:/app/.env.cloud:ro
      - ndga_lan_media_data:/app/media
      - ndga_lan_backup_data:/app/backups/postgres

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./.env.lan
    command: ["celery", "-A", "core", "beat", "--loglevel=INFO"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started
    volumes:
      - ./.env.cloud:/app/.env.cloud:ro
      - ndga_lan_media_data:/app/media
      - ndga_lan_backup_data:/app/backups/postgres

  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      web:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs/lan:/etc/nginx/certs:ro
      - ndga_lan_static_data:/app/staticfiles:ro
      - ndga_lan_media_data:/app/media:ro

  prometheus:
    image: prom/prometheus:v3.5.0
    restart: always
    depends_on:
      web:
        condition: service_started
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ndga_lan_prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:12.2.0
    restart: always
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ndga_lan_grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"

volumes:
  ndga_lan_postgres_data:
  ndga_lan_redis_data:
  ndga_lan_static_data:
  ndga_lan_media_data:
  ndga_lan_backup_data:
  ndga_lan_prometheus_data:
  ndga_lan_grafana_data:

