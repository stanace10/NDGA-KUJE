services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-ndga}
      POSTGRES_USER: ${DB_USER:-ndga}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ndga}
    volumes:
      - ndga_lan_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ndga} -d ${DB_NAME:-ndga}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--appendfsync",
        "everysec",
        "--maxmemory",
        "${REDIS_MAXMEMORY:-512mb}",
        "--maxmemory-policy",
        "${REDIS_MAXMEMORY_POLICY:-allkeys-lru}",
        "--tcp-keepalive",
        "60",
        "--timeout",
        "0"
      ]
    volumes:
      - ndga_lan_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./.env.lan
    command: ["/app/entrypoint.sh"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ndga_lan_static_data:/app/staticfiles
      - ndga_lan_media_data:/app/media
    expose:
      - "8000"

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./.env.lan
    command:
      [
        "celery",
        "-A",
        "core",
        "worker",
        "--loglevel=INFO",
        "--concurrency=${CELERY_WORKER_CONCURRENCY:-4}",
        "--prefetch-multiplier=${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}",
        "--max-tasks-per-child=${CELERY_WORKER_MAX_TASKS_PER_CHILD:-500}"
      ]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started
    volumes:
      - ndga_lan_media_data:/app/media

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./.env.lan
    command: ["celery", "-A", "core", "beat", "--loglevel=INFO"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started
    volumes:
      - ndga_lan_media_data:/app/media

  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      web:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ndga_lan_static_data:/app/staticfiles:ro
      - ndga_lan_media_data:/app/media:ro

volumes:
  ndga_lan_postgres_data:
  ndga_lan_redis_data:
  ndga_lan_static_data:
  ndga_lan_media_data:

