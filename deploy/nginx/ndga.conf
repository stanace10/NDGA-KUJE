map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream ndga_asgi {
    server 127.0.0.1:8001;
}

server {
    listen 80;
    listen [::]:80;
    server_name ndgakuje.org *.ndgakuje.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ndgakuje.org *.ndgakuje.org;

    ssl_certificate /etc/letsencrypt/live/ndgakuje.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ndgakuje.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 25m;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /static/ {
        alias /srv/ndga/current/staticfiles/;
        access_log off;
        expires 30d;
    }

    # If using local filesystem media in production.
    location /media/ {
        alias /srv/ndga/current/media/;
        expires 7d;
    }

    location / {
        proxy_pass http://ndga_asgi;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
