version: "3.9"

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-ndga_db}
      POSTGRES_USER: ${DB_USER:-ndga_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ndga@admin}
    volumes:
      - ndga_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ndga_user} -d ${DB_NAME:-ndga_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--appendfsync",
        "everysec",
        "--maxmemory",
        "${REDIS_MAXMEMORY:-768mb}",
        "--maxmemory-policy",
        "${REDIS_MAXMEMORY_POLICY:-allkeys-lru}",
        "--tcp-keepalive",
        "60",
        "--timeout",
        "0",
        "--client-output-buffer-limit",
        "pubsub 64mb 16mb 60"
      ]
    volumes:
      - ndga_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - ndga_minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  web:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.lan
    restart: always
    env_file:
      - ../../.env
    command: ["/app/deploy/docker/entrypoint.lan.sh"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ndga_media_data:/app/media
      - ndga_static_data:/app/staticfiles
    expose:
      - "8000"

  celery_worker:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.lan
    restart: always
    env_file:
      - ../../.env
    command:
      [
        "celery",
        "-A",
        "core",
        "worker",
        "--loglevel=INFO",
        "--concurrency=${CELERY_WORKER_CONCURRENCY:-6}",
        "--prefetch-multiplier=${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}",
        "--max-tasks-per-child=${CELERY_WORKER_MAX_TASKS_PER_CHILD:-500}"
      ]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ndga_media_data:/app/media

  celery_beat:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.lan
    restart: always
    env_file:
      - ../../.env
    command: ["celery", "-A", "core", "beat", "--loglevel=INFO"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ndga_media_data:/app/media

  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./nginx.lan.conf:/etc/nginx/conf.d/default.conf:ro
      - ndga_media_data:/app/media:ro
      - ndga_static_data:/app/staticfiles:ro

volumes:
  ndga_postgres_data:
  ndga_redis_data:
  ndga_minio_data:
  ndga_media_data:
  ndga_static_data:
