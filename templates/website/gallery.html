{% extends "website/base_public.html" %}

{% block public_content %}
  <main>
    <section class="page-banner reveal">
      <div class="site-shell">
        <div class="page-banner-grid">
          <div class="page-banner-copy">
            <p class="site-kicker">{{ page.eyebrow }}</p>
            <h1>{{ page.title }}</h1>
            <p>{{ page.intro }}</p>
          </div>
          <div class="page-banner-media">
            <img src="{{ page.hero_image }}" alt="{{ page.title }}">
          </div>
        </div>
      </div>
    </section>

    <section class="site-band reveal">
      <div class="site-shell">
        <div class="filter-strip">
          <a href="{{ public_root_url }}gallery/" class="filter-pill{% if not active_category %} is-active{% endif %}">All</a>
          {% for item in gallery_categories %}
            <a href="{{ item.url }}" class="filter-pill{% if active_category == item.slug %} is-active{% endif %}">{{ item.title }}</a>
          {% endfor %}
        </div>
        <div class="mosaic-stage">
          {% for item in gallery_images %}
            <button type="button" class="mosaic-card{% if forloop.first or forloop.counter == 4 or forloop.counter == 6 %} mosaic-card-tall{% endif %} gallery-card" data-lightbox-image="{{ item.image }}" data-lightbox-title="{{ item.title }}" data-lightbox-caption="{{ item.caption }}">
              <img src="{{ item.image }}" alt="{{ item.title }}" loading="lazy">
              <span>{{ item.title }}</span>
            </button>
          {% endfor %}
        </div>
      </div>
    </section>

    <div class="lightbox" id="siteLightbox" aria-hidden="true">
      <button type="button" class="site-panel-close lightbox-close" id="siteLightboxClose">Close</button>
      <div class="lightbox-inner">
        <img src="" alt="" id="siteLightboxImage">
        <div class="lightbox-copy">
          <h3 id="siteLightboxTitle"></h3>
          <p id="siteLightboxCaption"></p>
        </div>
      </div>
    </div>
  </main>
{% endblock %}
