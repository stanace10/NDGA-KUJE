server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location = /healthz/live {
        proxy_pass http://ndga_web/healthz/live;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
    }

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
    }

    location / {
        proxy_pass http://ndga_web;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_connect_timeout 5s;
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
    }
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name _;
    ssl_certificate /etc/nginx/certs/ndga-lan.crt;
    ssl_certificate_key /etc/nginx/certs/ndga-lan.key;
    ssl_session_cache shared:NDGA_SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;

    location = /healthz/live {
        proxy_pass http://ndga_web/healthz/live;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
    }

    location /static/ { alias /app/staticfiles/; expires 30d; add_header Cache-Control "public, max-age=2592000, immutable" always; }
    location /media/ { alias /app/media/; expires 7d; add_header Cache-Control "public, max-age=604800" always; }

    location / {
        proxy_pass http://ndga_web;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 5s;
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
    }
}
