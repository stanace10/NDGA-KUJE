name: Deploy Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      EC2_PORT: ${{ secrets.EC2_PORT }}
    steps:
      - name: Skip deploy when EC2 secrets are missing
        if: ${{ env.EC2_HOST == '' || env.EC2_USER == '' || env.EC2_SSH_KEY == '' }}
        run: echo "EC2 deploy secrets are not configured; skipping cloud deployment."

      - name: Deploy to EC2 over SSH
        if: ${{ env.EC2_HOST != '' && env.EC2_USER != '' && env.EC2_SSH_KEY != '' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key: ${{ env.EC2_SSH_KEY }}
          port: ${{ env.EC2_PORT || '22' }}
          script: |
            if [ -d "$HOME/NDGA" ]; then
              cd "$HOME/NDGA"
            elif [ -d "$HOME/ndga" ]; then
              cd "$HOME/ndga"
            elif [ -d "$HOME/ndga-platform" ]; then
              cd "$HOME/ndga-platform"
            else
              echo "NDGA repo directory not found on server"
              exit 1
            fi
            chmod +x scripts/auto_deploy.sh
            ./scripts/auto_deploy.sh
